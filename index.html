<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alianza Two Worlds - Próximamente</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #000; 
        }

    
        .bg-image {
            
            background-image: url('fondo.jpg');

           
            background-size: cover;      
            background-position: center; 
            background-repeat: no-repeat;
            
           
            width: 100%;
            height: 100vh; 
            
     
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .content h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .content p {
            font-size: 1.2rem;
            font-weight: 300;
        }

    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="content">
        <h1>Alianza Two Worlds</h1>
        <p>Nuestro nuevo sitio web está en camino.</p>
    </div>

</body>
</html>
